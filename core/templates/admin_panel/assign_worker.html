{% extends 'admin_panel/base.html' %}

{% block content %}

<div class="container mt-5">
    <h1>Assign Worker</h1>

    <p class="text-muted">
        Project: {{ project.project_name }}
    </p>

    <div class="card p-4">
        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">
                Save Worker
            </button>

            <a href="{% url 'projects' %}" class="btn btn-secondary">
                Cancel
            </a>
        </form>
    </div>
</div>

{% endblock %}
