{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>TopCraft Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>

<body>

<div class="d-flex min-vh-100">

    <div class="bg-dark text-white p-4 sidebar" style="min-height: 100vh;">
        <h2 class="mb-4">TopCraft</h2>

        <ul class="nav flex-column">
            <li class="nav-item mb-2"><a href="/" class="nav-link text-white">Dashboard</a></li>
            <li class="nav-item mb-2"><a href="/inventory/" class="nav-link text-white">Inventory</a></li>
            <li class="nav-item mb-2"><a href="/workers/" class="nav-link text-white">Workers</a></li>
            <li class="nav-item mb-2"><a href="/orders/" class="nav-link text-white">Orders</a></li>
            <li class="nav-item mb-2"><a href="/projects/" class="nav-link text-white">Projects</a></li>

            <li class="nav-item mt-4">
                <a href="{% url 'logout' %}" class="btn btn-danger w-100">Logout</a>
            </li>
        </ul>
    </div>

    <div class="flex-grow-1 p-4 bg-light">
        {% block content %}
        {% endblock %}
    </div>

</div>

</body>
</html>
