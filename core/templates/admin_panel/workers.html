{% extends 'admin_panel/base.html' %}

{% block content %}

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">TopCraft</a>
</nav>

<div class="container mt-5">
    <h1>Workers</h1>

    <a href="{% url 'add_worker' %}" class="btn btn-primary mb-3">
        Add Worker
    </a>

    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Role</th>
                <th>Skill</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for worker in workers %}
            <tr>
                <td>{{ worker.name }}</td>
                <td>{{ worker.role }}</td>
                <td>{{ worker.skill }}</td>
                <td>{{ worker.status }}</td>
                <td>
                    <a href="{% url 'edit_worker' worker.pk %}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="{% url 'delete_worker' worker.pk %}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5">No workers yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
