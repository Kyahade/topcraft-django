{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">TopCraft</a>
</nav>

<div class="container mt-5">
    <h1>Inventory</h1>

    <a href="{% url 'add_inventory' %}" class="btn btn-primary mb-3">
        Add Inventory Item
    </a>

    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
            <tr>
                <th>Item Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Unit</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.item_name }}</td>
                <td>{{ item.category }}</td>
                <td>{{ item.quantity }}</td>
                <td>{{ item.unit }}</td>
                <td>{{ item.status }}</td>
                <td>
                    <a href="{% url 'edit_inventory' item.pk %}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="{% url 'delete_inventory' item.pk %}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="6">No inventory items yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
