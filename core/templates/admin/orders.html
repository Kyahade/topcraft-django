{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">TopCraft</a>
</nav>

<div class="container mt-5">
    <h1>Orders</h1>

    <a href="{% url 'add_order' %}" class="btn btn-primary mb-3">Add Order</a>

    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
            <tr>
                <th>Customer</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Status</th>
                <th>Order Date</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for order in orders %}
            <tr>
                <td>{{ order.customer_name }}</td>
                <td>{{ order.product_name }}</td>
                <td>{{ order.quantity }}</td>
                <td>{{ order.status }}</td>
                <td>{{ order.order_date }}</td>
                <td>
                    <a href="{% url 'edit_order' order.pk %}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="{% url 'delete_order' order.pk %}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="6">No orders yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
