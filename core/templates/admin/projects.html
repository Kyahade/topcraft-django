{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">TopCraft</a>
</nav>

<div class="container mt-5">
    <h1>Projects</h1>

    <a href="{% url 'add_project' %}" class="btn btn-primary mb-3">Add Project</a>

    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
            <tr>
                <th>Project</th>
                <th>Assigned Worker</th>
                <th>Status</th>
                <th>Deadline</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for project in projects %}
            <tr>
                <td>{{ project.project_name }}</td>
                <td>{{ project.assigned_worker }}</td>
                <td>{{ project.status }}</td>
                <td>{{ project.deadline }}</td>
                <td>
                    <a href="{% url 'edit_project' project.pk %}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="{% url 'delete_project' project.pk %}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5">No projects yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
