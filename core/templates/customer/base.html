<!DOCTYPE html>
<html>
<head>
    <title>TopCraft Customer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f6f7;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background-color: #212529;
            color: white;
            padding: 24px 18px;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
        }

        .sidebar h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 35px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 12px 16px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }

        .logout-btn {
            background-color: #dc3545 !important;
            text-align: center;
            margin-top: 35px;
        }

        .main-content {
            margin-left: 260px;
            padding: 35px 28px;
            width: calc(100% - 260px);
        }

        h1 {
            font-size: 44px;
            font-weight: 700;
        }

        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <h2>TopCraft</h2>

        <a href="{% url 'customer_dashboard' %}">Dashboard</a>
        <a href="{% url 'customer_products' %}">Products</a>
        <a href="{% url 'customer_orders' %}">My Orders</a>

        <a href="{% url 'logout' %}" class="logout-btn">Logout</a>
    </aside>

    <main class="main-content">

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}

    </main>

</div>

</body>
</html>
