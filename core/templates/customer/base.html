<!DOCTYPE html>
<html>
<head>
    <title>TopCraft Customer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f1ec;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: #2b2118;
            color: white;
            padding: 26px 18px;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
        }

        .brand {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 36px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            color: #f8f5f0;
            text-decoration: none;
            font-weight: 500;
            padding: 13px 16px;
            margin-bottom: 10px;
            border-radius: 12px;
        }

        .sidebar a:hover {
            background-color: rgba(255, 255, 255, 0.10);
        }

        .main-content {
            margin-left: 260px;
            padding: 28px 34px;
            width: calc(100% - 260px);
        }

        .topbar {
            height: 64px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 28px;
        }

        .profile-toggle {
            background: white;
            border-radius: 999px;
            padding: 8px 14px 8px 8px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        .profile-toggle img {
            width: 40px;
            height: 40px;
            object-fit: cover;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            color: #2b2118;
        }

        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <div class="brand">TopCraft</div>

        <a href="{% url 'customer_dashboard' %}">Dashboard</a>
        <a href="{% url 'customer_products' %}">Products</a>
        <a href="{% url 'customer_orders' %}">My Orders</a>
    </aside>

    <main class="main-content">

        <div class="topbar">
            <div class="dropdown">

                <a
                    class="profile-toggle d-flex align-items-center gap-2 text-dark text-decoration-none dropdown-toggle"
                    href="#"
                    role="button"
                    data-bs-toggle="dropdown"
                >
                    {% if request.user.userprofile.profile_image %}
                        <img src="{{ request.user.userprofile.profile_image.url }}" class="rounded-circle">
                    {% else %}
                        <img src="https://via.placeholder.com/40" class="rounded-circle">
                    {% endif %}

                    <strong>{{ request.user.username }}</strong>
                </a>

                <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                    <li>
                        <a class="dropdown-item" href="{% url 'customer_profile' %}">
                            My Profile
                        </a>
                    </li>

                    <li>
                        <hr class="dropdown-divider">
                    </li>

                    <li>
                        <a class="dropdown-item text-danger" href="{% url 'logout' %}">
                            Logout
                        </a>
                    </li>
                </ul>

            </div>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
