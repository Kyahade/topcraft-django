{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h1>{{ title }}</h1>

    <form method="POST" class="card p-4 shadow-sm mt-3">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-success">Save</button>

        {% if request.user.userprofile.role == "customer" %}
            <a href="{% url 'customer_dashboard' %}" class="btn btn-secondary">Cancel</a>
        {% else %}
            <a href="{% url 'custom_requests' %}" class="btn btn-secondary">Cancel</a>
        {% endif %}
    </form>
</div>

</body>
</html>
